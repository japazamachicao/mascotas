<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión | TodoPeludos.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            color: #1e293b;
        }
        .container {
            text-align: center;
            max-width: 420px;
            background: white;
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(14, 165, 233, 0.1);
        }
        .emoji { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; color: #0f172a; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover { background: #0284c7; transform: translateY(-1px); }
        .brand { margin-top: 2rem; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🐾</span>
        <h1>¡Sin Conexión!</h1>
        <p>Parece que no tienes conexión a internet en este momento. TodoPeludos necesita estar conectado para funcionar correctamente.</p>
        <button class="btn" onclick="window.location.reload()">Reintentar</button>
        <p class="brand">TodoPeludos.com</p>
    </div>
</body>
</html>
